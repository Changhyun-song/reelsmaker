services:
  # ── Infrastructure ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reelsmaker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reelsmaker}
      POSTGRES_DB: ${POSTGRES_DB:-reelsmaker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reelsmaker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-minioadmin} $${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/$${S3_BUCKET:-reelsmaker};
      exit 0;
      "

  # ── Application ─────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reelsmaker}:${POSTGRES_PASSWORD:-reelsmaker}@postgres:5432/${POSTGRES_DB:-reelsmaker}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-reelsmaker}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      FAL_KEY: ${FAL_KEY:-}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      LUMA_API_KEY: ${LUMA_API_KEY:-}
      HIGGSFIELD_API_KEY_ID: ${HIGGSFIELD_API_KEY_ID:-}
      HIGGSFIELD_API_KEY_SECRET: ${HIGGSFIELD_API_KEY_SECRET:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-mock}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      TTS_PROVIDER: ${TTS_PROVIDER:-mock}
      FAL_IMAGE_MODEL: ${FAL_IMAGE_MODEL:-fal-ai/flux/schnell}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      RUNWAY_MODEL: ${RUNWAY_MODEL:-gen4_turbo}
      KLING_MODEL: ${KLING_MODEL:-fal-ai/kling-video/v2/master/image-to-video}
      LUMA_MODEL: ${LUMA_MODEL:-ray-2}
      HIGGSFIELD_MODEL: ${HIGGSFIELD_MODEL:-higgsfield-ai/dop/standard}
      HIGGSFIELD_IMAGE_MODEL: ${HIGGSFIELD_IMAGE_MODEL:-higgsfield-ai/soul/standard}
      ELEVENLABS_MODEL: ${ELEVENLABS_MODEL:-eleven_multilingual_v2}
      ELEVENLABS_DEFAULT_VOICE: ${ELEVENLABS_DEFAULT_VOICE:-}
      PROVIDER_TIMEOUT_SEC: ${PROVIDER_TIMEOUT_SEC:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-reelsmaker}:${POSTGRES_PASSWORD:-reelsmaker}@postgres:5432/${POSTGRES_DB:-reelsmaker}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-reelsmaker}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      FAL_KEY: ${FAL_KEY:-}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      LUMA_API_KEY: ${LUMA_API_KEY:-}
      HIGGSFIELD_API_KEY_ID: ${HIGGSFIELD_API_KEY_ID:-}
      HIGGSFIELD_API_KEY_SECRET: ${HIGGSFIELD_API_KEY_SECRET:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-mock}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      TTS_PROVIDER: ${TTS_PROVIDER:-mock}
      FAL_IMAGE_MODEL: ${FAL_IMAGE_MODEL:-fal-ai/flux/schnell}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      RUNWAY_MODEL: ${RUNWAY_MODEL:-gen4_turbo}
      KLING_MODEL: ${KLING_MODEL:-fal-ai/kling-video/v2/master/image-to-video}
      LUMA_MODEL: ${LUMA_MODEL:-ray-2}
      HIGGSFIELD_MODEL: ${HIGGSFIELD_MODEL:-higgsfield-ai/dop/standard}
      HIGGSFIELD_IMAGE_MODEL: ${HIGGSFIELD_IMAGE_MODEL:-higgsfield-ai/soul/standard}
      ELEVENLABS_MODEL: ${ELEVENLABS_MODEL:-eleven_multilingual_v2}
      ELEVENLABS_DEFAULT_VOICE: ${ELEVENLABS_DEFAULT_VOICE:-}
      PROVIDER_TIMEOUT_SEC: ${PROVIDER_TIMEOUT_SEC:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ../../apps/web/src:/app/src
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
